name: RDP

on:
workflow_dispatch:

jobs:
secure-rdp:
runs-on: windows-latest
timeout-minutes: 360

```
steps:

  - name: Enable Remote Desktop
    run: |
      Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
      Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0
      Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 0
      
      Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

  - name: Create RDP User
    run: |
      $password = "RDP@123456!"
      $securePass = ConvertTo-SecureString $password -AsPlainText -Force

      New-LocalUser -Name "RDP" -Password $securePass -AccountNeverExpires
      Add-LocalGroupMember -Group "Administrators" -Member "RDP"
      Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDP"

      echo "USERNAME=RDP" >> $env:GITHUB_ENV
      echo "PASSWORD=$password" >> $env:GITHUB_ENV

  - name: Download Tailscale
    run: |
      Invoke-WebRequest https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi -OutFile tailscale.msi
      Start-Process msiexec.exe -ArgumentList '/i tailscale.msi /quiet /norestart' -Wait

  - name: Connect Tailscale
    run: |
      & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }}

      Start-Sleep -Seconds 10

      $ip = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4

      echo "TAILSCALE_IP=$ip" >> $env:GITHUB_ENV

  - name: Show RDP Info
    run: |
      echo "=============================="
      echo "RDP ADDRESS: $env:TAILSCALE_IP"
      echo "USERNAME: $env:USERNAME"
      echo "PASSWORD: $env:PASSWORD"
      echo "=============================="

  - name: Keep Runner Alive
    run: |
      while ($true) {
        echo "RDP running..."
        Start-Sleep -Seconds 300
      }
```
